name: Lint
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --verbose
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv lock --python 3.13 && uv sync --python 3.13
      - name: Run Ruff
        run: uv run ruff check .
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv lock --python 3.13 && uv sync --python 3.13
      - name: Run Ruff
        run: uv run ruff format --check .
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv lock --python 3.13 && uv sync --python 3.13 --all-extras
      - name: Run mypy
        run: uv run mypy .
      - name: Run mypy on generated packages
        run: |
          for pkg in packages/kubex-k8s-*/; do
            echo "::group::mypy $pkg"
            uv run python -m scripts.codegen verify "$pkg"
            echo "::endgroup::"
          done
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - name: Install docs dependencies
        run: uv lock --python 3.13 && uv sync --group docs
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml docs/
          fail: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
