# Trusted Publisher Configuration (Test PyPI)
#
# For this workflow to publish via OIDC trusted publishing, each package must
# have a trusted publisher configured in its Test PyPI project settings at:
#   https://test.pypi.org/manage/project/<package-name>/settings/publishing/
#
# Configure the following trusted publisher for EACH of the 8 packages:
#   - kubex
#   - kubex-core
#   - kubex-k8s-1-32
#   - kubex-k8s-1-33
#   - kubex-k8s-1-34
#   - kubex-k8s-1-35
#   - kubex-k8s-1-36
#   - kubex-k8s-1-37
#
# Trusted publisher settings (same for all packages):
#   Owner:         codemageddon
#   Repository:    kubex
#   Workflow name: publish-test.yaml
#   Environment:   test-pypi

name: Publish to Test PyPI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      dev-version: ${{ steps.version.outputs.dev-version }}
      core-dev-version: ${{ steps.version.outputs.core-dev-version }}
      k8s-versions: ${{ steps.version.outputs.k8s-versions }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - name: Append dev version suffix
        id: version
        run: |
          DEV_SUFFIX=".dev${{ github.run_number }}${{ github.run_attempt }}"

          # Extract base version before modification
          BASE_VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' kubex/__version__.py)
          # Normalize PEP 440 version for PyPI URLs (e.g., 0.1.0-alpha.1.dev3 → 0.1.0a1.dev3)
          DEV_VERSION=$(python3 -c "from packaging.version import Version; print(Version('${BASE_VERSION}${DEV_SUFFIX}'))")
          echo "dev-version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"

          # kubex root package (dynamic version from __version__.py)
          sed -i "s/^VERSION = \"\(.*\)\"/VERSION = \"\1${DEV_SUFFIX}\"/" kubex/__version__.py

          # Workspace packages (version in pyproject.toml)
          for pkg in packages/*/; do
            sed -i "s/^version = \"\(.*\)\"/version = \"\1${DEV_SUFFIX}\"/" "${pkg}pyproject.toml"
          done

          # Pin workspace dependencies to exact dev versions so Test PyPI
          # installs form a coherent set from the same PR build.
          # Each dependency is pinned to its own actual version (not the root
          # kubex version), because workspace packages may carry a different
          # version string during development.
          CORE_DEV_VERSION_RAW="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/kubex-core/pyproject.toml)"
          CORE_DEV_VERSION=$(python3 -c "from packaging.version import Version; print(Version('${CORE_DEV_VERSION_RAW}'))")
          echo "core-dev-version=${CORE_DEV_VERSION}" >> "$GITHUB_OUTPUT"
          sed -i "s/\"kubex-core\"/\"kubex-core==${CORE_DEV_VERSION}\"/" pyproject.toml
          K8S_VERSIONS_JSON='{'
          FIRST=true
          for pkg in packages/kubex-k8s-*/; do
            K8S_DEV_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' "${pkg}pyproject.toml")"
            K8S_NORMALIZED=$(python3 -c "from packaging.version import Version; print(Version('${K8S_DEV_VERSION}'))")
            pkg_name=$(basename "$pkg")
            sed -i "s/\"${pkg_name}\"/\"${pkg_name}==${K8S_NORMALIZED}\"/" pyproject.toml
            sed -i "s/\"kubex-core\"/\"kubex-core==${CORE_DEV_VERSION}\"/" "${pkg}pyproject.toml"
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              K8S_VERSIONS_JSON="${K8S_VERSIONS_JSON},"
            fi
            K8S_VERSIONS_JSON="${K8S_VERSIONS_JSON}\"${pkg_name}\":\"${K8S_NORMALIZED}\""
          done
          K8S_VERSIONS_JSON="${K8S_VERSIONS_JSON}}"
          echo "k8s-versions=${K8S_VERSIONS_JSON}" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: |
          # Build in dependency order: kubex-core first, then k8s packages, then kubex
          uv build packages/kubex-core --out-dir dist/
          for pkg in packages/kubex-k8s-*/; do
            uv build "$pkg" --out-dir dist/
          done
          uv build --out-dir dist/

      - name: List built distributions
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  gate:
    needs: build
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Wait for required checks to pass
        uses: actions/github-script@v7
        timeout-minutes: 15
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const required = ['pre-commit', 'lint', 'format', 'mypy', 'test'];
            const sleep = ms => new Promise(r => setTimeout(r, ms));

            while (true) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
              });

              let allDone = true;
              const failures = [];

              for (const name of required) {
                const check = data.check_runs.find(c => c.name === name);
                if (!check || check.status !== 'completed') {
                  allDone = false;
                  break;
                }
                if (check.conclusion !== 'success') {
                  failures.push(`${name}: ${check.conclusion}`);
                }
              }

              if (allDone) {
                if (failures.length > 0) {
                  core.setFailed(`Required checks failed: ${failures.join(', ')}`);
                } else {
                  core.info('All required checks passed');
                }
                return;
              }

              core.info('Waiting for required checks to complete...');
              await sleep(15000);
            }

  publish:
    needs: gate
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1.14
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  comment:
    needs: [publish, build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          DEV_VERSION: ${{ needs.build.outputs.dev-version }}
          CORE_DEV_VERSION: ${{ needs.build.outputs.core-dev-version }}
          K8S_VERSIONS: ${{ needs.build.outputs.k8s-versions }}
        with:
          script: |
            const devVersion = process.env.DEV_VERSION;
            const coreDevVersion = process.env.CORE_DEV_VERSION;
            const k8sVersions = JSON.parse(process.env.K8S_VERSIONS);
            const packages = [
              { name: 'kubex', version: devVersion },
              { name: 'kubex-core', version: coreDevVersion },
              ...Object.entries(k8sVersions).map(([name, version]) => ({ name, version })),
            ];
            const lines = packages.map(({ name, version }) =>
              `- [${name} ${version}](https://test.pypi.org/project/${name}/${version}/)`
            );
            const body = [
              '## Test PyPI packages published',
              '',
              'The following packages have been published to Test PyPI:',
              '',
              ...lines,
              '',
              'Install with:',
              '```',
              `pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ kubex==${devVersion}`,
              '```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
