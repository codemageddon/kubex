name: Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (defaults to 'dev')"
        required: false
        default: "dev"

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - name: Install docs dependencies
        run: uv lock --python 3.13 && uv sync --group docs
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy (main → dev)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          uv run --group docs mike deploy --push --update-aliases dev
          # Plant the root redirect index.html so https://kubex.codemageddon.me/
          # resolves. Safe to run on every main push: this only points the root
          # at `dev`. Tag deploys do not touch the default — promotion to a
          # stable release remains manual (see comment on the tag step below).
          uv run --group docs mike set-default --push dev
      - name: Deploy (tag → versioned)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          uv run --group docs mike deploy --push "$VERSION"
          # NOTE: promotion to the `latest` alias and `mike set-default` is
          # deliberately manual. Auto-promoting on every `v*` tag would demote
          # a parallel-line release (e.g., a v1.x patch tag pushed after v2.x
          # would silently make v1 the default). Promote via workflow_dispatch
          # only after confirming the new tag is the project's newest line.
      - name: Deploy (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION_LABEL: ${{ github.event.inputs.version }}
        run: |
          uv run --group docs mike deploy --push --update-aliases "$VERSION_LABEL"
          # Only re-plant the root redirect when re-deploying the `dev` label;
          # promoting any other label to default is left manual.
          if [ "$VERSION_LABEL" = "dev" ]; then
            uv run --group docs mike set-default --push dev
          fi
