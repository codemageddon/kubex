[tools]
pre-commit = "4"
python = ["3.14", "3.13", "3.12", "3.11", "3.10"]

[env]
K8S_VERSIONS = "1.32,1.33,1.34,1.35,1.36,1.37"

[tasks."docs:serve"]
description = "Serve the docs site locally with live reload (also reloads on docstring changes in source packages)"
run = "uv run --group docs mkdocs serve --watch kubex --watch packages/kubex-core"

[tasks."docs:build"]
description = "Build the docs site in strict mode"
run = "uv run --group docs mkdocs build --strict"

[tasks.regenerate-models]
description = "Download latest K8s OpenAPI specs and regenerate all model packages"
run = "uv run python -m scripts.codegen regenerate --versions {{env.K8S_VERSIONS}}"

[tasks.test]
description = "Run the test suite with coverage"
run = "uv run pytest --cov=kubex --cov-report=term-missing ."
